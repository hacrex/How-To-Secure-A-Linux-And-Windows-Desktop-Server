---
- name: Linux Kernel Hardening
  hosts: all
  become: yes
  tasks:
    - name: Apply sysctl parameters for kernel hardening
      sysctl:
        name: "{{ item.key }}"
        value: "{{ item.value }}"
        state: present
        sysctl_set: yes
        reload: yes
      loop:
        - { key: 'net.ipv4.conf.all.rp_filter', value: '1' }
        - { key: 'net.ipv4.conf.default.rp_filter', value: '1' }
        - { key: 'net.ipv4.icmp_echo_ignore_broadcasts', value: '1' }
        - { key: 'net.ipv4.conf.all.accept_source_route', value: '0' }
        - { key: 'net.ipv4.conf.default.accept_source_route', value: '0' }
        - { key: 'net.ipv4.tcp_syncookies', value: '1' }
        - { key: 'net.ipv4.conf.all.accept_redirects', value: '0' }
        - { key: 'net.ipv4.conf.default.accept_redirects', value: '0' }
        - { key: 'net.ipv4.conf.all.send_redirects', value: '0' }
        - { key: 'net.ipv4.conf.default.send_redirects', value: '0' }
        - { key: 'net.ipv4.conf.all.log_martians', value: '1' }
        - { key: 'kernel.randomize_va_space', value: '2' }
        - { key: 'fs.protected_hardlinks', value: '1' }
        - { key: 'fs.protected_symlinks', value: '1' }
        - { key: 'fs.suid_dumpable', value: '0' }
        - { key: 'kernel.kptr_restrict', value: '2' }
        - { key: 'kernel.sysrq', value: '0' }
        - { key: 'fs.file-max', value: '65535' }
        - { key: 'net.core.default_qdisc', value: 'fq' }
        - { key: 'net.core.dev_weight', value: '64' }
        - { key: 'net.core.netdev_max_backlog', value: '16384' }
        - { key: 'net.core.optmem_max', value: '65535' }
        - { key: 'net.core.rmem_default', value: '262144' }
        - { key: 'net.core.rmem_max', value: '16777216' }
        - { key: 'net.core.somaxconn', value: '32768' }
        - { key: 'net.core.wmem_default', value: '262144' }
        - { key: 'net.core.wmem_max', value: '16777216' }
        - { key: 'net.ipv4.conf.all.bootp_relay', value: '0' }
        - { key: 'net.ipv4.conf.all.forwarding', value: '0' }
        - { key: 'net.ipv4.conf.all.proxy_arp', value: '0' }
        - { key: 'net.ipv4.conf.all.secure_redirects', value: '0' }
        - { key: 'net.ipv4.conf.default.forwarding', value: '0' }
        - { key: 'net.ipv4.conf.default.secure_redirects', value: '0' }
        - { key: 'net.ipv4.icmp_echo_ignore_all', value: '1' }
        - { key: 'net.ipv4.icmp_ignore_bogus_error_responses', value: '1' }
        - { key: 'net.ipv4.ip_forward', value: '0' }
        - { key: 'net.ipv4.ip_local_port_range', value: '2000 65000' }
        - { key: 'net.ipv4.ipfrag_high_thresh', value: '262144' }
        - { key: 'net.ipv4.ipfrag_low_thresh', value: '196608' }
        - { key: 'net.ipv4.neigh.default.gc_interval', value: '30' }
        - { key: 'net.ipv4.neigh.default.gc_thresh1', value: '32' }
        - { key: 'net.ipv4.neigh.default.gc_thresh2', value: '1024' }
        - { key: 'net.ipv4.neigh.default.gc_thresh3', value: '2048' }
        - { key: 'net.ipv4.neigh.default.proxy_qlen', value: '96' }
        - { key: 'net.ipv4.neigh.default.unres_qlen', value: '6' }
        - { key: 'net.ipv4.route.flush', value: '1' }
        - { key: 'net.ipv4.tcp_congestion_control', value: 'htcp' }
        - { key: 'net.ipv4.tcp_ecn', value: '1' }
        - { key: 'net.ipv4.tcp_fastopen', value: '3' }
        - { key: 'net.ipv4.tcp_fin_timeout', value: '15' }
        - { key: 'net.ipv4.tcp_keepalive_intvl', value: '15' }
        - { key: 'net.ipv4.tcp_keepalive_probes', value: '5' }
        - { key: 'net.ipv4.tcp_keepalive_time', value: '1800' }
        - { key: 'net.ipv4.tcp_max_orphans', value: '16384' }
        - { key: 'net.ipv4.tcp_max_syn_backlog', value: '2048' }
        - { key: 'net.ipv4.tcp_max_tw_buckets', value: '1440000' }
        - { key: 'net.ipv4.tcp_moderate_rcvbuf', value: '1' }
        - { key: 'net.ipv4.tcp_no_metrics_save', value: '1' }
        - { key: 'net.ipv4.tcp_orphan_retries', value: '0' }
        - { key: 'net.ipv4.tcp_reordering', value: '3' }
        - { key: 'net.ipv4.tcp_retries1', value: '3' }
        - { key: 'net.ipv4.tcp_retries2', value: '15' }
        - { key: 'net.ipv4.tcp_rfc1337', value: '1' }
        - { key: 'net.ipv4.tcp_rmem', value: '8192 87380 16777216' }
        - { key: 'net.ipv4.tcp_sack', value: '0' }
        - { key: 'net.ipv4.tcp_slow_start_after_idle', value: '0' }
        - { key: 'net.ipv4.tcp_syn_retries', value: '5' }
        - { key: 'net.ipv4.tcp_synack_retries', value: '2' }
        - { key: 'net.ipv4.tcp_timestamps', value: '1' }
        - { key: 'net.ipv4.tcp_tw_recycle', value: '0' }
        - { key: 'net.ipv4.tcp_tw_reuse', value: '1' }
        - { key: 'net.ipv4.tcp_window_scaling', value: '0' }
        - { key: 'net.ipv4.tcp_wmem', value: '8192 65536 16777216' }
        - { key: 'net.ipv4.udp_rmem_min', value: '16384' }
        - { key: 'net.ipv4.udp_wmem_min', value: '16384' }
        - { key: 'net.ipv6.conf.all.accept_ra', value: '0' }
        - { key: 'net.ipv6.conf.all.accept_redirects', value: '0' }
        - { key: 'net.ipv6.conf.all.accept_source_route', value: '0' }
        - { key: 'net.ipv6.conf.all.autoconf', value: '0' }
        - { key: 'net.ipv6.conf.all.forwarding', value: '0' }
        - { key: 'net.ipv6.conf.default.accept_ra_defrtr', value: '0' }
        - { key: 'net.ipv6.conf.default.accept_ra_pinfo', value: '0' }
        - { key: 'net.ipv6.conf.default.accept_ra_rtr_pref', value: '0' }
        - { key: 'net.ipv6.conf.default.accept_ra', value: '0' }
        - { key: 'net.ipv6.conf.default.accept_redirects', value: '0' }
        - { key: 'net.ipv6.conf.default.accept_source_route', value: '0' }
        - { key: 'net.ipv6.conf.default.autoconf', value: '0' }
        - { key: 'net.ipv6.conf.default.forwarding', value: '0' }

    - name: Ensure /proc is mounted with hidepid=2
      mount:
        path: /proc
        src: proc
        fstype: proc
        opts: defaults,hidepid=2
        state: mounted
