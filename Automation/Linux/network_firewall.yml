---
- name: Linux Network and Firewall Configuration
  hosts: all
  become: yes
  tasks:
    - name: Install UFW (Debian/Ubuntu)
      apt:
        name: ufw
        state: present
      when: ansible_os_family == "Debian"

    - name: Configure UFW default policies (Debian/Ubuntu)
      ufw:
        state: enabled
        default_incoming_policy: deny
        default_outgoing_policy: allow
      when: ansible_os_family == "Debian"

    - name: Allow SSH, HTTP, HTTPS in UFW (Debian/Ubuntu)
      ufw:
        rule: allow
        port: "{{ item }}"
        proto: tcp
      loop: ["22", "80", "443"]
      when: ansible_os_family == "Debian"

    - name: Install firewalld (RedHat/CentOS)
      yum:
        name: firewalld
        state: present
      when: ansible_os_family == "RedHat"

    - name: Start and enable firewalld (RedHat/CentOS)
      service:
        name: firewalld
        state: started
        enabled: yes
      when: ansible_os_family == "RedHat"

    - name: Configure firewalld default zone to drop (RedHat/CentOS)
      firewalld:
        zone: public
        state: enabled
        permanent: yes
        default_zone: drop
      when: ansible_os_family == "RedHat"

    - name: Allow SSH, HTTP, HTTPS in firewalld (RedHat/CentOS)
      firewalld:
        service: "{{ item }}"
        zone: public
        state: enabled
        permanent: yes
      loop: ["ssh", "http", "https"]
      when: ansible_os_family == "RedHat"
      notify: Reload firewalld

    - name: Install Fail2Ban
      package:
        name: fail2ban
        state: present

    - name: Copy Fail2Ban jail.local configuration
      copy:
        src: jail.local
        dest: /etc/fail2ban/jail.local
        owner: root
        group: root
        mode: '0644'
      notify: Restart fail2ban

    - name: Ensure Fail2Ban is running and enabled
      service:
        name: fail2ban
        state: started
        enabled: yes

  handlers:
    - name: Reload firewalld
      command: firewall-cmd --reload

    - name: Restart fail2ban
      service:
        name: fail2ban
        state: restarted
