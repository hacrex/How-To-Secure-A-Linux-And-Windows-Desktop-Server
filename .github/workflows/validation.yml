name: Documentation Validation

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  validate-markdown:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install markdownlint
        run: npm install -g markdownlint-cli
      
      - name: Lint Markdown files
        run: |
          find . -name "*.md" -not -path "./.git/*" -not -path "./.mimocode/*" | xargs markdownlint --config .markdownlint.json
      
      - name: Check for broken links
        run: |
          echo "Checking for common broken link patterns..."
          grep -rn "techbrown.com" --include="*.md" . && echo "WARNING: Found potentially broken techbrown.com links" || true
      
      - name: Validate file structure
        run: |
          echo "Validating documentation structure..."
          
          # Check that all referenced files exist
          for mdfile in $(find . -name "*.md" -not -path "./.git/*"); do
            echo "Checking $mdfile"
            # Extract relative links and verify they exist
            grep -oE '\]\(\./[^)]+\)' "$mdfile" | sed 's/](\.\//\.\//' | sed 's/)$//' | while read -r link; do
              if [ -f "$(dirname "$mdfile")/$link" ]; then
                echo "  ✓ $link exists"
              else
                echo "  ⚠ $link may not exist (verify manually)"
              fi
            done
          done

  validate-scripts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Validate PowerShell syntax
        run: |
          echo "PowerShell syntax validation requires Windows or pwsh"
          echo "Install pwsh on Linux: https://learn.microsoft.com/en-us/powershell/scripting/install/install-ubuntu"
      
      - name: Validate Ansible playbooks
        run: |
          if command -v ansible-playbook &> /dev/null; then
            for playbook in Automation/Linux/*.yml; do
              echo "Validating $playbook"
              ansible-playbook --syntax-check "$playbook" || echo "Syntax check failed for $playbook"
            done
          else
            echo "Ansible not installed. Skipping syntax check."
            echo "Install with: pip install ansible"
          fi

  validate-diagrams:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Check diagram source files
        run: |
          echo "Checking diagram source files..."
          for d2file in $(find . -name "*.d2" -not -path "./.git/*"); do
            echo "Found D2 diagram: $d2file"
            pngfile="${d2file%.d2}.png"
            if [ -f "$pngfile" ]; then
              echo "  ✓ PNG exists: $pngfile"
            else
              echo "  ✗ Missing PNG: $pngfile"
              echo "     Generate with: d2 $d2file $pngfile"
            fi
          done
          
          for mmdfile in $(find . -name "*.mmd" -not -path "./.git/*"); do
            echo "Found Mermaid diagram: $mmdfile"
            pngfile="${mmdfile%.mmd}.png"
            if [ -f "$pngfile" ]; then
              echo "  ✓ PNG exists: $pngfile"
            else
              echo "  ✗ Missing PNG: $pngfile"
              echo "     Generate with: mmdc -i $mmdfile -o $pngfile"
            fi
          done

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Check for hardcoded secrets patterns
        run: |
          echo "Scanning for potential hardcoded secrets..."
          
          # Check for common secret patterns (excluding known safe files)
          patterns=(
            "password\s*=\s*['\"][^'\"]+['\"]"
            "api_key\s*=\s*['\"][^'\"]+['\"]"
            "secret\s*=\s*['\"][^'\"]+['\"]"
            "AWS_SECRET_ACCESS_KEY"
          )
          
          for pattern in "${patterns[@]}"; do
            if grep -riE "$pattern" --include="*.yml" --include="*.ps1" --include="*.sh" --exclude-dir=".git" . 2>/dev/null; then
              echo "WARNING: Potential secret found matching pattern: $pattern"
            fi
          done
          
          echo "Security scan completed"

  report:
    needs: [validate-markdown, validate-scripts, validate-diagrams, security-scan]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Generate validation report
        run: |
          echo "=== Documentation Validation Report ==="
          echo ""
          echo "Markdown Validation: ${{ needs.validate-markdown.result }}"
          echo "Script Validation: ${{ needs.validate-scripts.result }}"
          echo "Diagram Validation: ${{ needs.validate-diagrams.result }}"
          echo "Security Scan: ${{ needs.security-scan.result }}"
          echo ""
          
          if [[ "${{ needs.validate-markdown.result }}" == "failure" ]] || \
             [[ "${{ needs.validate-scripts.result }}" == "failure" ]] || \
             [[ "${{ needs.validate-diagrams.result }}" == "failure" ]]; then
            echo "❌ Validation FAILED - Please review the logs above"
            exit 1
          else
            echo "✅ Validation PASSED"
          fi
